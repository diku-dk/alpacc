name: CI

on:
  pull_request:
    types: [synchronize, labeled]

  push:
    branches: [ main ]

env:
  GHC_VERSION: '9.14.1'
  CABAL_VERSION: '3.16.0.0'
  FUTHARK_VERSION: 'nightly'

jobs:
  build:
    if: github.event_name == 'push' || contains(github.event.pull_request.labels.*.name, 'test')
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v3

      - name: Set up GHC ${{ env.GHC_VERSION }}
        uses: haskell-actions/setup@v2
        id: setup
        with:
          ghc-version: ${{ env.GHC_VERSION }}
          cabal-version: ${{ env.CABAL_VERSION }}
          cabal-update: true

      - name: Cache Cabal packages
        uses: actions/cache@v3
        with:
          path: |
            ~/.cabal/packages
            ~/.cabal/store
            dist-newstyle
          key: ${{ runner.os }}-cabal-${{ env.GHC_VERSION }}-${{ hashFiles('**/*.cabal', '**/cabal.project') }}
          restore-keys: |
            ${{ runner.os }}-cabal-${{ env.GHC_VERSION }}-
            ${{ runner.os }}-cabal-

      - name: Install dependencies
        run: cabal build all --only-dependencies

      - name: Build
        run: cabal build all

      - name: Install
        run: cabal install

      - name: Upload alpacc binary
        uses: actions/upload-artifact@v4
        with:
          name: alpacc-binary
          path: ~/.local/bin/alpacc

  test:
    needs: build
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v3

      - name: Set up GHC ${{ env.GHC_VERSION }}
        uses: haskell-actions/setup@v2
        id: setup
        with:
          ghc-version: ${{ env.GHC_VERSION }}
          cabal-version: ${{ env.CABAL_VERSION }}
          cabal-update: true

      - name: Restore Cabal cache
        uses: actions/cache/restore@v3
        with:
          path: |
            ~/.cabal/packages
            ~/.cabal/store
            dist-newstyle
          key: ${{ runner.os }}-cabal-${{ env.GHC_VERSION }}-${{ hashFiles('**/*.cabal', '**/cabal.project') }}
          restore-keys: |
            ${{ runner.os }}-cabal-${{ env.GHC_VERSION }}-
            ${{ runner.os }}-cabal-

      - name: Download alpacc binary
        uses: actions/download-artifact@v4
        with:
          name: alpacc-binary
          path: ~/.local/bin/

      - name: Make alpacc binary executable
        run: chmod +x ~/.local/bin/alpacc

      - name: Install Futhark (${{ env.FUTHARK_VERSION }})
        uses: diku-dk/install-futhark@v1.1.0
        with:
          version: ${{ env.FUTHARK_VERSION }}

      - name: Unit tests
        run: cabal test all

      - name: Futhark lexer tests
        run: bash tests/testfuthark.sh 0 0 50 10 --lexer

      - name: Futhark parser tests (0 1)
        run: bash tests/testfuthark.sh 0 1 50 10 --parser

      - name: Futhark parser tests (1 1)
        run: bash tests/testfuthark.sh 1 1 50 10 --parser

      - name: Futhark parser tests (2 2)
        run: bash tests/testfuthark.sh 2 2 50 10 --parser

      - name: Futhark parser tests (3 3)
        run: bash tests/testfuthark.sh 3 3 50 10 --parser

      - name: Futhark end-to-end tests (1 1)
        run: bash tests/testfuthark.sh 1 1 50 10

      - name: Futhark end-to-end tests (2 2)
        run: bash tests/testfuthark.sh 2 2 50 10

      - name: Futhark end-to-end tests (3 3)
        run: bash tests/testfuthark.sh 3 3 50 10

  test-json-multicore:
    needs: build
    runs-on: ubuntu-24.04

    steps:
      - uses: actions/checkout@v3

      - name: Download alpacc binary
        uses: actions/download-artifact@v4
        with:
          name: alpacc-binary
          path: ~/.local/bin/

      - name: Make alpacc binary executable
        run: chmod +x ~/.local/bin/alpacc

      - name: Install Futhark (${{ env.FUTHARK_VERSION }})
        uses: diku-dk/install-futhark@v1.1.0
        with:
          version: ${{ env.FUTHARK_VERSION }}

      - name: JSON grammar tests with multicore backend
        # CFLAGS follow the same pattern used by the Futhark project's own
        # multicore CI: UBSan (-fsanitize=undefined) with -fno-sanitize-recover
        # turns undefined behaviour into immediate crashes, making failures
        # deterministic rather than silently wrong.
        run: |
          export CFLAGS="-fsanitize=undefined -fno-sanitize-recover -O"
          bash tests/testjson.sh multicore
